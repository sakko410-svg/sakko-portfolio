<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAHA SAKKOR | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
    --accent: #d63b1a;
    --bg: #080808;
    --text: #ede9df;
    --card-bg: rgba(255, 255, 255, 0.02);
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;-webkit-font-smoothing: antialiased;}

/* --- 演出1: フィルムノイズテクスチャ --- */
body::after {
    content: "";
    position: fixed;
    top: -100%; left: -100%; width: 300%; height: 300%;
    background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png");
    opacity: 0.04; pointer-events: none; z-index: 100;
    animation: noise 0.2s infinite;
}
@keyframes noise {
    0% { transform: translate(0,0) }
    10% { transform: translate(-5%,-5%) }
    20% { transform: translate(-10%,5%) }
    80% { transform: translate(5%,-10%) }
    100% { transform: translate(0,0) }
}

/* --- 背景グリッド（より繊細に） --- */
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04;background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.1) 50px),repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.1) 50px);}

/* --- レイアウト構造 --- */
.pf{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1.2fr;min-height:100vh}

/* --- 左側：シネマティック画像エリア --- */
.left{position:relative;height:100vh;overflow:hidden;position:sticky;top:0;}
.left img{
    width:100%;height:100%;object-fit:cover;object-position:center top;
    filter:grayscale(100%) contrast(1.1) brightness(0.7);
    transform:scale(1.1);
    transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal-img img { transform: scale(1); } /* 登場時にズームアウト */

.left::after{
    content:'';position:absolute;inset:0;
    background: linear-gradient(90deg, transparent 60%, var(--bg) 100%),
                linear-gradient(0deg, var(--bg) 0%, transparent 40%);
}

.name{position:absolute;left:40px;bottom:60px;z-index:2}
.name h1{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(60px, 10vw, 110px);
    line-height:.82;letter-spacing:-0.02em;
    overflow: hidden;
}
.name h1 span {
    display: block;
    transform: translateY(100%);
    transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}
.reveal-text h1 span { transform: translateY(0); }

.name p{
    font-family:'Space Mono',monospace;font-size:12px;opacity:0;
    letter-spacing:.4em;text-transform:uppercase;margin-top:15px;
    transition: all 1s ease 0.5s;
}
.reveal-text p { opacity: 0.6; transform: translateX(10px); }

/* --- 右側：コンテンツ --- */
.right{padding:80px 60px;display:flex;flex-direction:column;gap:40px}

.section-tag{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;
    color:var(--accent);text-transform:uppercase;margin-bottom:10px;
    display: flex; align-items: center; gap: 10px;
}
.section-tag::before { content: ""; width: 20px; height: 1px; background: var(--accent); }

/* --- カードデザイン：磁気のようなホバー --- */
.reveal-item { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
.reveal-item.is-visible { opacity: 1; transform: translateY(0); }

.card{
    border: 1px solid rgba(255,255,255,0.05); border-left: 2px solid transparent;
    padding: 24px; background: var(--card-bg); backdrop-filter: blur(10px);
    transition: all 0.4s ease; cursor: pointer; position: relative;
}
.card:hover{
    background: rgba(255,255,255,0.05); border-left: 2px solid var(--accent);
    transform: translateX(10px);
}
.card::before {
    content: "VIEW DETAILS"; position: absolute; right: 20px; bottom: 20px;
    font-family: 'Space Mono'; font-size: 8px; opacity: 0; transition: 0.4s;
}
.card:hover::before { opacity: 0.4; }

.work-title{font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:0.05em}
.work-desc{font-size:14px;line-height:1.8;color:rgba(237,233,223,0.5)}
