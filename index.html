<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAHA SAKKOR | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #d63b1a;
    --bg: #080808;
    --text: #ede9df;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;}

/* 背景：グリッド（絶対に上に被らないよう z-index: -1） */
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.06;background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.1) 50px),repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.1) 50px);}

/* 全体レイアウト */
.pf{position:relative;display:grid;grid-template-columns:1fr 1.2fr;min-height:100vh}

/* 左側：画像エリア（JSなしで動くように設定） */
.left{position:relative;height:100vh;overflow:hidden;position:sticky;top:0;background:#111;}
.left img{
    width:100%;height:100%;object-fit:cover;object-position:center top;
    filter:grayscale(100%) contrast(1.1) brightness(0.8);
    animation: imageReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes imageReveal {
    from { transform: scale(1.2); filter: grayscale(100%) brightness(0); }
    to { transform: scale(1); filter: grayscale(100%) brightness(0.8); }
}

.left::after{
    content:'';position:absolute;inset:0;
    background: linear-gradient(90deg, transparent 60%, var(--bg) 100%),
                linear-gradient(0deg, var(--bg) 0%, transparent 40%);
}

.name{position:absolute;left:40px;bottom:60px;z-index:2}
.name h1{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(60px, 8vw, 100px);
    line-height:.82;letter-spacing:-0.01em;
}
.name h1 span {
    display: block;
    animation: textUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) both;
}
.name h1 span:nth-child(2) { animation-delay: 0.2s; }

@keyframes textUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* 右側：コンテンツ（ここもJSなしでフェードイン） */
.right{padding:80px 40px;display:flex;flex-direction:column;gap:40px}

.reveal-item {
    animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.reveal-item:nth-child(1) { animation-delay: 0.5s; }
.reveal-item:nth-child(2) { animation-delay: 0.7s; }
.reveal-item:nth-child(3) { animation-delay: 0.9s; }
.reveal-item:nth-child(4) { animation-delay: 1.1s; }

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-tag{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;
    color:var(--accent);text-transform:uppercase;margin-bottom:15px;
    display: flex; align-items: center; gap: 10px;
}
.section-tag::before { content: ""; width: 20px; height: 1px; background: var(--accent); }

.card{
    border: 1px solid rgba(255,255,255,0.06); border-left: 2px solid var(--accent);
    padding: 24px; background: rgba(255,255,255,0.02); backdrop-filter: blur(10px);
    transition: all 0.4s ease; margin-bottom: 20px;
}
.card:hover{
    background: rgba(255,255,255,0.05);
    transform: translateX(10px);
}

.work-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.work-desc{font-size:14px;line-height:1.8;color:rgba(237,233,223,0.6)}

/* タイムライン */
.timeline-item{padding-bottom: 30px; border-left: 1px solid rgba(214,59,26,0.2); padding-left: 24px; position: relative;}
.timeline-item::after{
    content: ""; position: absolute; left: -4.5px; top: 8px;
    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
.stat{text-align:center; padding: 20px; border: 1px solid rgba(255,255,255,0.04);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px; color: var(--accent);}
.stat-label{font-size:10px; opacity: 0.5; letter-spacing: 0.1em;}

@media(max-width:768px){
    .pf{grid-template-columns:1fr}
    .left{height:50vh; position: relative;}
    .right{padding:40px 20px}
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="pf">
    <div class="left">
        <img src="image.png" alt="SAHA SAKKOR">
        <div class="name">
            <h1><span>SAHA</span><span>SAKKOR</span></h1>
            <p style="font-family:'Space Mono'; font-size:12px; letter-spacing:0.3em; opacity:0.6; margin-top:10px;">Creative Producer</p>
        </div>
    </div>

    <div class="right">
        <div class="reveal-item">
            <div class="section-tag">Career</div>
            <div class="timeline">
                <div class="timeline-item">
                    <div class="work-title">2021–2025 東京都立大学</div>
                    <div class="work-desc">インターンにて営業・企画・制作を経験。</div>
                </div>
                <div class="timeline-item">
                    <div class="work-title">2025.4 CyberAgent / AbemaTV</div>
                    <div class="work-desc">広告営業、番組企画、ディレクションに従事。</div>
                </div>
                <div class="timeline-item
