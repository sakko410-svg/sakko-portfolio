<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAHA SAKKOR Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#ede9df;font-family:'Noto Sans JP',sans-serif}
.pf{display:grid;grid-template-columns:1fr 1.1fr;min-height:100vh;overflow:hidden}
.left{position:relative;animation:fadeInLeft 1s ease}
.left img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05) brightness(.9)}
.left::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent 40%,#080808 100%)}
.name{position:absolute;left:24px;bottom:24px;z-index:2}
.name h1{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:.9;letter-spacing:.02em}
.name p{font-size:12px;opacity:.7;letter-spacing:.15em}
.right{padding:32px;display:flex;flex-direction:column;gap:20px;animation:fadeInUp 1.1s ease}
.card{border:1px solid rgba(255,255,255,.08);padding:16px;border-left:3px solid #d63b1a;backdrop-filter:blur(4px);transition:.3s}
.card:hover{transform:translateY(-4px)}
.tag{font-family:'Space Mono',monospace;font-size:11px;color:#d63b1a;letter-spacing:.15em;margin-bottom:8px}
.work-title{font-size:18px;font-weight:500;margin-bottom:6px}
.work-desc{font-size:13px;line-height:1.7;opacity:.75}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@media(max-width:768px){
  .pf{grid-template-columns:1fr}
  .left{height:52vh}
  .left::after{background:linear-gradient(to top,rgba(8,8,8,.9) 0%,transparent 60%)}
  .name h1{font-size:48px}
  .right{padding:20px}
}
.glow-line{height:1px;background:linear-gradient(90deg,transparent,rgba(214,59,26,.9),transparent);animation:pulseLine 2.5s infinite;margin:6px 0 2px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-family:'Space Mono',monospace;font-size:10px;padding:6px 10px;border:1px solid rgba(255,255,255,.08);border-radius:999px;background:rgba(255,255,255,.02)}
.metric{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:#d63b1a;letter-spacing:.04em}
.metric-sub{font-size:11px;opacity:.65;letter-spacing:.12em}
@keyframes pulseLine{0%,100%{opacity:.35}50%{opacity:1}}

.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.08;background-image:repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.15) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.15) 40px);animation:gridMove 18s linear infinite;}
@keyframes gridMove{from{transform:translateY(0)}to{transform:translateY(40px)}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="pf">
  <div class="left">
    <img src="image.png" alt="SAHA SAKKOR">
    <div class="name">
      <h1>SAHA<br>SAKKOR</h1>
      <p>Creative Producer</p>
    </div>
  </div>
  <div class="right">
    <div class="glow-line"></div>
    <div class="badge-row">
      <div class="badge">Creative</div>
      <div class="badge">Direction</div>
      <div class="badge">Production</div>
    </div>
    <div>
      <div class="metric">10+</div>
      <div class="metric-sub">PROJECTS DIRECTED</div>
    </div>
    <div class="card">
      <div class="tag">PROFILE</div>
      <div class="work-title">Creative Direction / SNS / 映像演出</div>
      <div class="work-desc">営業・制作・配信・ディレクションまで一気通貫で対応可能。モバイルでも見やすいレスポンシブ仕様に変更済み。</div>
    </div>
    <div class="card">
      <div class="tag">FEATURE</div>
      <div class="work-title">Animation Enabled</div>
      <div class="work-desc">表示時のフェードアニメーション、ホバーアニメーションに加え、スクロール時の表示アニメーションを実装。</div>
    </div>
  </div>
</div>
<script>
window.addEventListener('DOMContentLoaded', function () {
  const cards = document.querySelectorAll('.card');
  const observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.15 });

  cards.forEach(function(card, i){
    card.style.opacity = '0';
    card.style.transform = 'translateY(30px)';
    card.style.transition = 'all 0.8s ease ' + (i * 0.15) + 's';
    observer.observe(card);
  });
});
</script>
</body>
</html>
